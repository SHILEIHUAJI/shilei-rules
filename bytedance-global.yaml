# 字节跳动海外规则 (Bytedance Global)
# 包含：TikTok, Lemon8
# 全平台通用规则
behavior: classical
payload:
  # 域名规则 (DOMAIN / DOMAIN-SUFFIX)
  - 'DOMAIN-SUFFIX,tiktokv.us'
  - 'DOMAIN-SUFFIX,tiktokcdn-us.com'
  - 'DOMAIN-SUFFIX,ttcdn-us.com'
  - 'DOMAIN-SUFFIX,ibyteimg.com'
  - 'DOMAIN-SUFFIX,byteoversea.com'
  - 'DOMAIN-SUFFIX,tik-tokapi.com'
  - 'DOMAIN-SUFFIX,lemon8-app.com'
  - 'DOMAIN-SUFFIX,akamaized.net'
  - 'DOMAIN-SUFFIX,appsflyersdk.com'

  # 域名关键字 (DOMAIN-KEYWORD)
  - 'DOMAIN-KEYWORD,tiktokcdn'
  - 'DOMAIN-KEYWORD,tiktokv'
  - 'DOMAIN-KEYWORD,common-sign'
  - 'DOMAIN-KEYWORD,pull-w5'
  - 'DOMAIN-KEYWORD,push-rtmp'
  - 'DOMAIN-KEYWORD,appsflyersdk'

    # --- 全球核心补充 ---
  - 'DOMAIN-SUFFIX,tiktok.com' 
  - 'DOMAIN-SUFFIX,tiktokv.com' 
  - 'DOMAIN-SUFFIX,musical.ly' 
  - 'DOMAIN-SUFFIX,byteoversea.com' 
  - 'DOMAIN-KEYWORD,tiktok'          


  # 网络特征规则 (IP-ASN / UDP) 
  - 'DOMAIN,sp.v2.udp-over-tcp.arpa'           # 专用 UDP 隧道
  - 'IP-ASN,16509' # 签名/信令
  
  - 'IP-ASN,20940'

  - 'IP-ASN,'
  - 'IP-ASN,396986'
  
  - 'IP-ASN,54113' # 视频流/CDN
  
  - 'IP-ASN,60068'
  
  
