name: Auto Update Rule Count

on:
  push:
    branches:
      - main  # 确认你的主分支叫 main 还是 master

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4  # 用最新的 v4 更稳

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run count script
        # 显式使用 python 命令并在根目录运行
        run: python count_rules.py

      - name: Commit and Push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: 自动更新规则统计" && git push)
