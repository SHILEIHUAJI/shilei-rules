name: Auto Update Rule Count

on:
  push:
    paths:
      - '**.yaml'                # 只有 YAML 文件变动时触发
      - 'count_rules.py'         # 脚本本身变动时触发
    branches:
      - main                     # 或者是你的主分支名称
  workflow_dispatch:             # 保留手动触发按钮，方便调试

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write            # 核心：必须赋予写权限
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run count script
        run: python count_rules.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "📊 自动更新规则统计报告" && git push)
