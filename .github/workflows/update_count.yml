name: Auto Update Rule Count

on:
  push:
    branches:
      - main

jobs:
  update-readme:
    # 这一行是关键：明确赋予机器人写仓库的权限
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run count script
        run: python count_rules.py

      - name: Commit and Push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          # 使用 git add . 确保规则文件的去重修改也能同步上去
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: 自动更新规则统计" && git push)
