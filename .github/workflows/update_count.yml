name: Auto Update Rule Count

# 当代码推送到 main 分支时自动触发
on:
  push:
    branches:
      - main

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出你的仓库代码到云端服务器
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2. 配置 Python 运行环境
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # 3. 运行刚才写的统计脚本
      - name: Run count script
        run: python count_rules.py

      # 4. 让机器人把改好的 README 自动提交回仓库
      - name: Commit and Push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          # 检查是否有改动，有改动才生成一条 commit 并 push
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: 自动更新规则统计数量"
          git push
